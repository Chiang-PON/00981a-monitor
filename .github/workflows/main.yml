name: 主動式ETF 監控

on:
  schedule:
    # 每天台灣時間 18:00 (UTC 10:00) — 平日執行，假日由程式自動跳過
    - cron: '00 10 * * 1-5'
    # 每週五台灣時間 18:30 (UTC 10:30) — 週報
    - cron: '30 10 * * 5'
  workflow_dispatch:
    inputs:
      mode:
        description: '執行模式 (daily / weekly)'
        required: false
        default: 'daily'
      force:
        description: '強制執行（忽略假日）'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  daily:
    if: github.event.schedule != '30 10 * * 5'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run daily report
      env:
        LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
      run: |
        MODE="${{ github.event.inputs.mode || 'daily' }}"
        FORCE="${{ github.event.inputs.force || 'false' }}"
        CMD="python main.py --mode $MODE"
        if [ "$FORCE" = "true" ]; then CMD="$CMD --force"; fi
        echo "執行: $CMD"
        $CMD

    - name: Commit and Push Data
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add history/*.csv
        git commit -m "Auto update data: $(date +'%Y-%m-%d')" || exit 0
        git push

  weekly:
    if: github.event.schedule == '30 10 * * 5'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run weekly report
      env:
        LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
      run: python main.py --mode weekly --force

    - name: Commit and Push Data
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add history/*.csv
        git commit -m "Auto update data: $(date +'%Y-%m-%d')" || exit 0
        git push
