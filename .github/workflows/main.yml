name: 主動式ETF 監控

on:
  schedule:
    - cron: '00 10 * * *' # 台灣時間每天 18:00
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 selenium webdriver-manager

      - name: Run Crawler and LINE Notification
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: python main.py --force

      - name: Generate Web Dashboard (生成網頁)
        run: python generate_web.py

      - name: Commit and Push Data and Web
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history/ index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update ETF history and Web Dashboard [skip ci]" && git push)