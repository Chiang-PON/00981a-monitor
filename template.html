<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 籌碼決策戰情室 v8.0 - 決策雷達</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        :root {
            --bg-base: #f4f4f5; --bg-nav: #ffffff; --bg-panel: #ffffff; --bg-panel-hover: #fafafa; --bg-row-even: #ffffff; --bg-row-odd: #fafafa;
            --border-dim: #e4e4e7; --border-focus: #2563eb; --text-main: #18181b; --text-dim: #71717a;
            --color-buy: #dc2626; --color-sell: #059669; --color-accent: #2563eb;
            --shadow-buy: none; --shadow-sell: none; --shadow-accent: none; --box-shadow-buy: none; --box-shadow-sell: none;
            --shadow-panel: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05); --bar-track: #f4f4f5;
        }

        [data-theme="dark"] {
            --bg-base: #050505; --bg-nav: #050505; --bg-panel: #0d0d0d; --bg-panel-hover: #141414; --bg-row-even: #0d0d0d; --bg-row-odd: #0a0a0a;
            --border-dim: #262626; --border-focus: #00f0ff; --text-main: #f4f4f5; --text-dim: #84848f;
            --color-buy: #ff2a5f; --color-sell: #00ff9d; --color-accent: #00f0ff;
            --shadow-buy: 0 0 10px rgba(255, 42, 95, 0.4); --shadow-sell: 0 0 10px rgba(0, 255, 157, 0.4); --shadow-accent: 0 0 10px rgba(0, 240, 255, 0.4);
            --box-shadow-buy: 0 0 12px rgba(255, 42, 95, 0.3); --box-shadow-sell: 0 0 12px rgba(0, 255, 157, 0.3);
            --shadow-panel: 0 8px 32px rgba(0, 0, 0, 0.5); --bar-track: #111111;
        }

        body { background-color: var(--bg-base); color: var(--text-main); font-family: "Noto Sans TC", sans-serif; min-height: 100vh; transition: background-color 0.3s ease, color 0.3s ease; }
        [data-theme="dark"] body { background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px); background-size: 100% 4px; }
        .font-mono { font-family: "JetBrains Mono", monospace; }

        .theme-nav { background-color: var(--bg-nav); border-color: var(--border-dim); }
        .theme-panel { background-color: var(--bg-panel); border-color: var(--border-dim); box-shadow: var(--shadow-panel); }
        .theme-border { border-color: var(--border-dim); }
        .theme-text { color: var(--text-main); }
        .theme-text-dim { color: var(--text-dim); }
        .theme-bg-input { background-color: var(--bg-base); color: var(--text-main); border-color: var(--border-dim); }
        .theme-bg-input:focus-within, .theme-bg-input:hover { border-color: var(--border-focus); }
        .row-even { background-color: var(--bg-row-even); border-color: var(--border-dim); }
        .row-odd { background-color: var(--bg-row-odd); border-color: var(--border-dim); }
        .row-hover:hover { background-color: var(--bg-panel-hover); }
        .bar-track { background-color: var(--bar-track); }

        .text-buy { color: var(--color-buy); text-shadow: var(--shadow-buy); }
        .text-sell { color: var(--color-sell); text-shadow: var(--shadow-sell); }
        .text-accent { color: var(--color-accent); text-shadow: var(--shadow-accent); }
        .bg-buy { background-color: var(--color-buy); box-shadow: var(--box-shadow-buy); }
        .bg-sell { background-color: var(--color-sell); box-shadow: var(--box-shadow-sell); }
        .bg-accent { background-color: var(--color-accent); box-shadow: var(--shadow-accent); }
        .border-buy { border-color: var(--color-buy); }
        .border-sell { border-color: var(--color-sell); }
        .border-accent { border-color: var(--color-accent); }

        .bg-neutral { background-color: #e4e4e7; }
        [data-theme="dark"] .bg-neutral { background-color: #262626; }

        .tab-btn { transition: all 0.2s; white-space: nowrap; font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase; }
        .tab-active { background-color: var(--text-main); color: var(--bg-panel); font-weight: 700; }
        [data-theme="dark"] .tab-active { background: #1a1a1a; color: var(--color-accent); border: 1px solid var(--color-accent); box-shadow: 0 0 15px rgba(0, 240, 255, 0.15), inset 0 0 10px rgba(0, 240, 255, 0.05); }
        .tab-inactive { background-color: var(--bg-base); color: var(--text-dim); border: 1px solid var(--border-dim); }
        .tab-inactive:hover { border-color: var(--text-main); color: var(--text-main); }

        .tab-ai-agent { background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #00f0ff 100%); color: #fff; border: 1px solid rgba(0, 240, 255, 0.5); font-weight: 700; box-shadow: 0 0 12px rgba(0, 240, 255, 0.3); }
        [data-theme="dark"] .tab-ai-agent { background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #06b6d4 100%); border-color: rgba(6, 182, 212, 0.6); box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); color: var(--text-main); }
        .tab-ai-agent:hover { filter: brightness(1.15); }
        .tab-ai-agent.tab-active { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); border-color: var(--color-accent); box-shadow: 0 0 20px rgba(0, 240, 255, 0.5); color: var(--color-accent); }

        @keyframes pulse-dot { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(220, 38, 38, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
        [data-theme="dark"] @keyframes pulse-dot { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 42, 95, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 42, 95, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 42, 95, 0); } }
        .live-dot { height: 8px; width: 8px; background-color: var(--color-buy); border-radius: 50%; display: inline-block; animation: pulse-dot 2s infinite; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input, select { outline: none; }

        .pill-btn {
            min-height: 2.5rem;
            padding: 0.375rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8125rem;
            line-height: 1.35;
            font-family: "JetBrains Mono", ui-monospace, monospace;
            border: 1px solid var(--border-dim);
            background-color: var(--bg-base);
            color: var(--text-main);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            text-align: center;
            max-width: 100%;
        }
        .pill-btn-idle:hover { border-color: var(--border-focus); color: var(--text-main); }
        .pill-btn-active {
            background-color: var(--color-accent);
            color: #fff;
            border-color: var(--color-accent);
            font-weight: 700;
            box-shadow: var(--shadow-accent);
        }
        [data-theme="dark"] .pill-btn-active {
            color: #0a0a0a;
            box-shadow: 0 0 14px rgba(0, 240, 255, 0.35);
        }
        @media (min-width: 640px) {
            .pill-btn {
                min-height: 2.75rem;
                padding: 0.5rem 1rem;
            }
        }
        .table-num-cell { white-space: nowrap; font-size: 0.8125rem; }
        @media (min-width: 640px) {
            .table-num-cell { font-size: 0.875rem; }
        }

        #ai-report-output h1, #ai-report-output h2, #ai-report-output h3 { margin-top: 1em; margin-bottom: 0.5em; font-weight: 700; }
        #ai-report-output p { margin-bottom: 0.75em; }
        #ai-report-output ul, #ai-report-output ol { margin-left: 1.5em; margin-bottom: 0.75em; }

        .unit-btn { background-color: var(--bg-base); color: var(--text-dim); }
        .unit-btn:hover { color: var(--text-main); }
        .unit-btn-amount.unit-active { background-color: var(--color-buy); color: #fff; }
        .unit-btn-shares.unit-active { background-color: var(--color-accent); color: #fff; }
        [data-theme="dark"] .unit-btn-amount.unit-active { background-color: var(--color-buy); color: #fff; }
        [data-theme="dark"] .unit-btn-shares.unit-active { background-color: var(--color-accent); color: #fff; }

        .consensus-panel { border-color: #ef4444; background-color: #fef2f2; }
        [data-theme="dark"] .consensus-panel { border-color: #f97316; background-color: rgba(124, 45, 18, 0.4); }
        .consensus-title { color: #dc2626; }
        [data-theme="dark"] .consensus-title { color: #fb923c; }
        .consensus-tag { background-color: #fecaca; color: #b91c1c; }
        [data-theme="dark"] .consensus-tag { background-color: rgba(194, 65, 12, 0.5); color: #fdba74; }

        #broker-map { position: relative; z-index: 10; background: var(--bg-panel); }
        #broker-map .leaflet-container { font-family: "Noto Sans TC", sans-serif; border-radius: 0.75rem; }
        .leaflet-tooltip.broker-pin-tooltip {
            font-family: "Noto Sans TC", sans-serif !important;
            font-weight: 800 !important;
            font-size: 0.95rem !important;
            padding: 8px 12px !important;
            border-radius: 8px !important;
            border: 1px solid var(--border-dim) !important;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12) !important;
            background: rgba(255, 255, 255, 0.96) !important;
            color: var(--text-main) !important;
        }
        [data-theme="dark"] .leaflet-tooltip.broker-pin-tooltip {
            background: rgba(23, 23, 23, 0.96) !important;
            color: #fafafa !important;
            border-color: #3f3f46 !important;
        }
        [data-theme="dark"] #broker-map.broker-map-dark .leaflet-control-attribution {
            background: rgba(13, 13, 13, 0.85);
            color: var(--text-dim);
        }
        [data-theme="dark"] #broker-map.broker-map-dark .leaflet-control-attribution a {
            color: var(--color-accent);
        }
    </style>
</head>
<body class="pb-24 pt-6">

    <nav class="w-full theme-nav border-b fixed top-0 z-50 flex justify-between items-center px-4 md:px-8 py-3 transition-colors">
        <div class="flex items-center gap-4">
            <span class="live-dot"></span>
            <span class="font-mono text-sm tracking-widest font-bold text-buy">SYSTEM.LIVE</span>
            <span class="theme-text-dim hidden md:inline">|</span>
            <h1 class="text-lg font-black tracking-[0.2em] theme-text">戰情室 <span class="theme-text-dim font-mono text-xs">v8.0</span></h1>
        </div>
        <div class="flex items-center gap-4 font-mono text-xs theme-text-dim">
            <span id="live-clock" class="hidden md:inline">Loading...</span>
            <button onclick="toggleTheme()" class="p-1.5 rounded-md theme-border border hover:theme-text transition-colors" title="切換深淺模式">
                <svg id="icon-sun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg id="icon-moon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 md:px-6 mt-20">

        <div class="theme-panel border rounded-xl p-5 md:p-8 transition-colors">

            <div id="control-panel" class="mb-6">
                <div class="flex flex-wrap gap-2 mb-4">
                    <button type="button" id="mode-tab-etf" onclick="setMode('ETF')" class="tab-btn px-4 py-2.5 font-mono rounded-lg border transition-colors tab-active">ETF 模式</button>
                    <button type="button" id="mode-tab-broker" onclick="setMode('BROKER')" class="tab-btn px-4 py-2.5 font-mono rounded-lg border transition-colors tab-inactive">分點模式</button>
                    <button type="button" id="mode-tab-search" onclick="setMode('SEARCH')" class="tab-btn px-4 py-2.5 font-mono rounded-lg border transition-colors tab-inactive">個股搜尋</button>
                </div>
            </div>

            <div id="section-pills" class="mb-4">
                <label class="block font-mono text-xs theme-text-dim mb-2 uppercase tracking-wider">目標標的（點選切換）</label>
                <div id="target-pills-container" class="space-y-3"></div>
            </div>

            <div id="timeframe-unit-row" class="flex flex-wrap items-center gap-4 mb-6">
                <div>
                    <label class="block font-mono text-xs theme-text-dim mb-1.5 uppercase tracking-wider">天數</label>
                    <select id="timeframe-selector" onchange="onTimeframeChange()" class="theme-bg-input border theme-border rounded-lg px-3 py-2.5 text-sm font-mono theme-text cursor-pointer transition-colors focus:border-focus">
                        <option value="1">近1日</option>
                        <option value="5">近5日</option>
                        <option value="10">近10日</option>
                        <option value="20">近20日</option>
                        <option value="30">近30日</option>
                    </select>
                </div>
                <div>
                    <label class="block font-mono text-xs theme-text-dim mb-1.5 uppercase tracking-wider">單位</label>
                    <div class="flex rounded-lg overflow-hidden border theme-border" role="group">
                        <button type="button" id="unit-btn-amount" onclick="setUnit('amount')" class="unit-btn unit-btn-amount px-4 py-2.5 text-sm font-mono font-bold border-r theme-border transition-colors">
                            金額
                        </button>
                        <button type="button" id="unit-btn-shares" onclick="setUnit('shares')" class="unit-btn unit-btn-shares px-4 py-2.5 text-sm font-mono font-bold transition-colors">
                            張數
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block font-mono text-xs theme-text-dim mb-1.5 uppercase tracking-wider">結束日期</label>
                    <select id="date-selector" onchange="onDateChange()" class="theme-bg-input border theme-border rounded-lg px-3 py-2.5 text-sm font-mono theme-text cursor-pointer transition-colors min-w-[9rem]"></select>
                </div>
            </div>

            <div id="search-mode-panel" class="hidden mb-6">
                <div class="max-w-3xl mx-auto rounded-xl border theme-border bg-[var(--bg-panel)] p-6 md:p-8 shadow-[0_8px_30px_rgba(0,0,0,0.08)] dark:shadow-[0_8px_40px_rgba(0,0,0,0.45)]">
                    <div class="text-center mb-6">
                        <h2 class="text-xl md:text-2xl font-black theme-text tracking-wide">個股主力追蹤</h2>
                        <p class="mt-2 text-sm theme-text-dim font-mono leading-relaxed">依上方「天數」「結束日期」累計區間，掃描 ETF／分點持倉異動；排序依目前「單位」。</p>
                    </div>
                    <div class="flex flex-col sm:flex-row sm:flex-wrap gap-4 sm:items-end justify-center">
                        <div class="w-full sm:flex-1 sm:min-w-[14rem]">
                            <label for="stock-reverse-input" class="block font-mono text-xs theme-text-dim mb-1.5 uppercase tracking-wider">股票代號／名稱</label>
                            <input type="text" id="stock-reverse-input" placeholder="輸入股票代號或名稱，例如: 2330 或 台積電" autocomplete="off"
                                class="theme-bg-input border theme-border rounded-lg px-3 py-2.5 text-sm font-mono theme-text w-full">
                        </div>
                        <button type="button" id="stock-reverse-btn" onclick="runStockReverseSearch()" class="tab-btn px-6 py-2.5 font-mono rounded-lg border theme-border hover:theme-text transition-colors whitespace-nowrap w-full sm:w-auto">
                            搜尋
                        </button>
                    </div>
                    <div id="stock-reverse-results" class="mt-6 rounded-xl border theme-border theme-bg-input overflow-hidden min-h-[8rem]"></div>
                </div>
            </div>

            <div id="dashboard-mode-panel">

            <div id="broker-map" class="hidden h-64 md:h-80 w-full rounded-xl border theme-border z-10 mb-6 overflow-hidden" aria-hidden="true"></div>

            <div id="header-main" class="flex flex-col sm:flex-row sm:justify-between sm:items-end gap-4 pb-5 mb-6 theme-border border-b">
                <div class="flex flex-col gap-1">
                    <span class="font-mono text-xs theme-text-dim tracking-widest uppercase">TARGET_ASSET</span>
                    <div class="flex items-baseline gap-3">
                        <h2 id="current-etf-title" class="text-3xl md:text-4xl font-black theme-text tracking-wider">---</h2>
                        <span id="current-date-display" class="font-mono text-lg text-accent"></span>
                    </div>
                </div>
                <div id="header-controls" class="flex flex-wrap items-center gap-3">
                    <div class="theme-bg-input border rounded-md flex items-center px-3 py-1.5 transition-colors">
                        <span class="theme-text-dim font-mono mr-2">></span>
                        <input type="text" id="search-input" onkeyup="handleSearch()" placeholder="SEARCH_TICKER..." class="bg-transparent text-sm w-full sm:w-36 font-mono placeholder-gray-400 theme-text border-none">
                    </div>
                </div>
            </div>

            <div id="sector-flow-container" class="mb-8 flex gap-3 overflow-x-auto hide-scrollbar pb-2"></div>

            <div id="normal-view">
                <div id="empty-state" class="text-center font-mono theme-text-dim py-12 theme-bg-base border border-dashed theme-border rounded-lg hidden">
                    > NO_DATA_DETECTED_
                </div>
                <div id="consensus-alert-container" class="consensus-panel hidden mb-6 rounded-xl border-2 p-4">
                    <h4 class="font-mono font-bold text-sm mb-3 flex items-center gap-2 consensus-title">
                        主力共識警報 (3+ 分點買進)
                    </h4>
                    <div id="consensus-alert-list" class="flex flex-wrap gap-2"></div>
                </div>
                <div id="data-table-container" class="hidden">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="min-w-0">
                            <h4 class="font-mono text-buy text-sm font-bold tracking-widest mb-3 border-l-4 border-buy pl-3 py-1">買超排行</h4>
                            <div class="theme-bg-base border theme-border rounded-lg overflow-x-auto overflow-y-hidden">
                                <table class="w-full text-sm min-w-[280px]">
                                    <thead>
                                        <tr class="theme-bg-input border-b theme-border">
                                            <th class="text-left py-3.5 px-3 sm:px-4 font-mono font-bold theme-text-dim w-14 sm:w-16">排名</th>
                                            <th class="text-left py-3.5 px-3 sm:px-4 font-mono font-bold theme-text-dim">股票</th>
                                            <th class="text-right py-3.5 px-3 sm:px-4 font-mono font-bold theme-text-dim whitespace-nowrap">淨買超</th>
                                        </tr>
                                    </thead>
                                    <tbody id="buy-rank-tbody"></tbody>
                                </table>
                            </div>
                        </div>
                        <div class="min-w-0">
                            <h4 class="font-mono text-sell text-sm font-bold tracking-widest mb-3 border-l-4 border-sell pl-3 py-1">賣超排行</h4>
                            <div class="theme-bg-base border theme-border rounded-lg overflow-x-auto overflow-y-hidden">
                                <table class="w-full text-sm min-w-[280px]">
                                    <thead>
                                        <tr class="theme-bg-input border-b theme-border">
                                            <th class="text-left py-3.5 px-3 sm:px-4 font-mono font-bold theme-text-dim w-14 sm:w-16">排名</th>
                                            <th class="text-left py-3.5 px-3 sm:px-4 font-mono font-bold theme-text-dim">股票</th>
                                            <th class="text-right py-3.5 px-3 sm:px-4 font-mono font-bold theme-text-dim whitespace-nowrap">淨賣超</th>
                                        </tr>
                                    </thead>
                                    <tbody id="sell-rank-tbody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="search-view" class="hidden">
                <h3 class="font-mono text-xs theme-text-dim tracking-[0.2em] mb-4 flex items-center border-b theme-border pb-2">
                    <span class="theme-text-dim opacity-50 mr-2">///</span> RADAR_SCAN_RESULTS
                </h3>
                <div id="search-results-list" class="flex flex-col border-t theme-border mt-1"></div>
            </div>

            <div id="ai-agent-view" class="hidden">
                <h3 class="font-mono text-xs theme-text-dim tracking-[0.2em] mb-4 flex items-center border-b theme-border pb-2">
                    <span class="theme-text-dim opacity-50 mr-2">///</span> AI_ANALYSIS_PROTOCOL
                </h3>

                <div class="mb-6 flex flex-wrap gap-3 items-center">
                    <div class="theme-bg-input border rounded-md flex items-center px-3 py-2 transition-colors flex-1 min-w-[250px]">
                        <span class="theme-text-dim font-mono mr-2 text-sm">KEY</span>
                        <input type="password" id="api-key-input" placeholder="輸入 OpenAI API Key (僅存於本地瀏覽器)" class="bg-transparent text-sm flex-1 font-mono theme-text border-none focus:outline-none">
                    </div>
                    <button onclick="saveApiKey()" class="tab-btn px-4 py-2 font-mono rounded-sm border theme-border hover:theme-text transition-colors">
                        [ SAVE_KEY ]
                    </button>
                    <span id="api-key-status" class="font-mono text-xs theme-text-dim ml-2"></span>
                </div>

                <div class="flex flex-col gap-4 mb-6">
                    <div class="flex flex-wrap items-center gap-3">
                        <div class="theme-bg-input border rounded-md flex items-center px-3 py-2 transition-colors flex-1 min-w-[200px] focus-within:border-accent">
                            <span class="theme-text-dim font-mono mr-2 text-sm">TICKER</span>
                            <input type="text" id="ai-ticker-input" placeholder="輸入股票代號 (例: 2330 或 台積電)" class="bg-transparent text-sm flex-1 font-mono theme-text border-none focus:outline-none">
                        </div>
                        <button id="btn-run-ai" onclick="runAIAnalysis()" class="tab-btn px-4 py-2 font-mono rounded-sm border border-accent text-accent hover:bg-accent hover:text-white transition-colors shadow-sm">
                            [ EXECUTE_ANALYSIS ]
                        </button>
                    </div>
                </div>

                <div class="theme-bg-input border rounded-lg p-5 transition-colors min-h-[300px]">
                    <div id="ai-report-output" class="w-full bg-transparent font-mono text-sm theme-text leading-relaxed">等待執行分析... (請先於上方設定 API Key 並輸入代號)</div>
                </div>
            </div>

            </div>

        </div>
    </div>

    <script>
        /* 全域狀態：須在任何 init / 主題回呼之前宣告，避免 let TDZ (Cannot access before initialization) */
        let brokerMap = null;
        let brokerMapBasemapLayer = null;
        let brokerMapMarkers = {};
        let currentMode = 'ETF';
        let currentETF = 'GLOBAL_CONSENSUS';
        let currentDate = '';
        let currentUnit = 'amount';
        let currentDays = 5;
        let etfList = [];

        const db = __DB_JSON__;
        const brokerLabels = __BROKER_JSON__ || {};
        const availableDatesDesc = Object.keys(db).sort().reverse();
        const FAMILY_TAB = "GLOBAL_CONSENSUS";
        const KAIJI_TAB = "KAIJI_CONSENSUS";
        const AI_TAB = "AI_AGENT";

        let allKeys = new Set();
        Object.values(db).forEach(dateData => { Object.keys(dateData).forEach(k => allKeys.add(k)); });
        const brokerCodes = Object.keys(brokerLabels);
        const brokerCoords = {
            "9207": { name: "凱基永和", lat: 25.0080, lng: 121.5150 },
            "920A": { name: "凱基板橋", lat: 25.0118, lng: 121.4653 },
            "920D": { name: "凱基市府", lat: 25.0392, lng: 121.5644 },
            "920F": { name: "凱基站前", lat: 25.0460, lng: 121.5160 },
            "9216": { name: "凱基信義", lat: 25.0320, lng: 121.5670 },
            "9217": { name: "凱基松山", lat: 25.0500, lng: 121.5770 },
            "9218": { name: "凱基大直", lat: 25.0800, lng: 121.5450 },
            "921F": { name: "凱基天母", lat: 25.1140, lng: 121.5320 },
            "921J": { name: "凱基土城", lat: 24.9820, lng: 121.4420 },
            "921S": { name: "凱基新莊", lat: 25.0360, lng: 121.4320 },
            "9229": { name: "凱基中山", lat: 25.0560, lng: 121.5240 },
            "9234": { name: "凱基竹北", lat: 24.8252, lng: 121.0125 },
            "9238": { name: "凱基士林", lat: 25.0898, lng: 121.5230 },
            "9239": { name: "凱基市政", lat: 24.1620, lng: 120.6470 },
            "9257": { name: "凱基林口", lat: 25.0760, lng: 121.3780 },
            "9272": { name: "凱基竹科", lat: 24.7814, lng: 120.9876 },
            "9285": { name: "凱基中壢", lat: 24.9576, lng: 121.2250 },
            "9287": { name: "凱基內湖", lat: 25.0796, lng: 121.5796 }
        };

        function getCartoBasemapUrl() {
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';
            return dark
                ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
                : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
        }

        function getCartoAttribution() {
            return '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>';
        }

        function shortBrokerMapLabel(fullName) {
            if (!fullName || typeof fullName !== 'string') return '';
            const t = fullName.replace(/凱基/g, '').trim();
            return t || fullName;
        }

        const etfCodes = Array.from(allKeys).filter(k => !brokerCodes.includes(k) && k !== AI_TAB).sort();
        etfList = [FAMILY_TAB];
        etfList = etfList.concat(etfCodes);
        if (brokerCodes.some(b => allKeys.has(b))) {
            etfList.push(KAIJI_TAB);
            etfList = etfList.concat(brokerCodes.filter(b => allKeys.has(b)).sort((a, b) => brokerCodes.indexOf(a) - brokerCodes.indexOf(b)));
        }
        etfList.push(AI_TAB);

        currentMode = 'ETF';
        currentETF = FAMILY_TAB;
        currentDate = availableDatesDesc.length > 0 ? availableDatesDesc[0] : '';
        currentUnit = 'amount';
        currentDays = 5;

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcons(savedTheme);
            updateBrokerMapThemeClass();
        }
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcons(newTheme);
            updateBrokerMapThemeClass();
        }
        function updateThemeIcons(theme) {
            const sun = document.getElementById('icon-sun');
            const moon = document.getElementById('icon-moon');
            if (!sun || !moon) return;
            if (theme === 'dark') {
                sun.classList.remove('hidden');
                moon.classList.add('hidden');
            } else {
                sun.classList.add('hidden');
                moon.classList.remove('hidden');
            }
        }
        initTheme();

        function updateClock() {
            const el = document.getElementById('live-clock');
            if (!el) return;
            const now = new Date();
            const utc = now.toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
            el.textContent = utc;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function aggregateData(etf, days) {
            if (availableDatesDesc.length === 0) return { buy: [], sell: [] };
            let dateIndex = availableDatesDesc.indexOf(currentDate);
            if (dateIndex === -1) dateIndex = 0;
            const dateSlice = availableDatesDesc.slice(dateIndex, dateIndex + Math.min(days, availableDatesDesc.length - dateIndex));
            const agg = {};
            const etfListToUse = (etf === FAMILY_TAB)
                ? etfList.filter(e => e !== FAMILY_TAB && e !== KAIJI_TAB && e !== AI_TAB && !brokerCodes.includes(e))
                : (etf === KAIJI_TAB)
                    ? brokerCodes.filter(b => allKeys.has(b))
                    : [etf];

            dateSlice.forEach(d => {
                const dataOfDay = db[d] || {};
                etfListToUse.forEach(e => {
                    const dayData = dataOfDay[e];
                    if (!dayData) return;
                    [...(dayData.new_buy || []), ...(dayData.increased || [])].forEach(i => {
                        const key = i.name;
                        if (!agg[key]) agg[key] = { name: key, code: i.code || '', sector: i.sector || '其他', diff: 0, amount: 0 };
                        agg[key].diff += i.diff;
                        agg[key].amount += (i.amount || 0);
                    });
                    [...(dayData.decreased || []), ...(dayData.sold_out || [])].forEach(i => {
                        const key = i.name;
                        if (!agg[key]) agg[key] = { name: key, code: i.code || '', sector: i.sector || '其他', diff: 0, amount: 0 };
                        agg[key].diff -= i.diff;
                        agg[key].amount -= (i.amount || 0);
                    });
                });
            });

            const buy = Object.values(agg).filter(x => x.diff > 0);
            const sell = Object.values(agg).filter(x => x.diff < 0).map(x => ({ ...x, diff: Math.abs(x.diff), amount: Math.abs(x.amount) }));
            return { buy, sell };
        }

        function getETFLabel(etf) {
            if (etf === FAMILY_TAB) return 'GLOBAL_CONSENSUS (全家族共識)';
            if (etf === KAIJI_TAB) return 'KAIJI_CONSENSUS (凱基大聯盟)';
            if (etf === AI_TAB) return 'AI_AGENT';
            if (brokerLabels[etf]) return etf + ' ' + brokerLabels[etf];
            return etf;
        }

        /** 按鈕顯示用：分點模式下略去「凱基」以節省版面（標的代碼與邏輯仍用 etf / data-etf） */
        function getPillButtonLabel(etf) {
            const full = getETFLabel(etf);
            if (currentMode !== 'BROKER') return full;
            return full.replace(/凱基/g, '').replace(/\s+/g, ' ').trim();
        }

        function getDropdownEtfList() {
            if (currentMode === 'ETF') {
                return [FAMILY_TAB, AI_TAB, ...etfCodes];
            }
            const brokers = brokerCodes.filter(b => allKeys.has(b)).sort((a, b) => brokerCodes.indexOf(a) - brokerCodes.indexOf(b));
            return [KAIJI_TAB, ...brokers];
        }

        function getETFGroupForRender(etf) {
            if (currentMode === 'ETF') {
                if (etf === FAMILY_TAB || etf === AI_TAB) return 'core';
                return 'etf';
            }
            if (etf === KAIJI_TAB) return 'core';
            return 'broker';
        }

        const ETF_GROUP_DEFS = [
            { id: 'core', title: '【 核心決策 】' },
            { id: 'etf', title: '【 ETF 標的 】' },
            { id: 'broker', title: '【 主力分點 】' }
        ];

        function updateModeTabStyles() {
            const etfBtn = document.getElementById('mode-tab-etf');
            const brokerBtn = document.getElementById('mode-tab-broker');
            const searchBtn = document.getElementById('mode-tab-search');
            if (!etfBtn || !brokerBtn || !searchBtn) return;
            const base = 'tab-btn px-4 py-2.5 font-mono rounded-lg border transition-colors';
            etfBtn.className = base + ' ' + (currentMode === 'ETF' ? 'tab-active' : 'tab-inactive');
            brokerBtn.className = base + ' ' + (currentMode === 'BROKER' ? 'tab-active' : 'tab-inactive');
            searchBtn.className = base + ' ' + (currentMode === 'SEARCH' ? 'tab-active' : 'tab-inactive');
        }

        function updateBrokerMapThemeClass() {
            const el = document.getElementById('broker-map');
            if (!el) return;
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';
            el.classList.toggle('broker-map-dark', dark);
            if (brokerMapBasemapLayer) {
                brokerMapBasemapLayer.setUrl(getCartoBasemapUrl());
            }
        }

        function initBrokerMap() {
            if (brokerMap || typeof L === 'undefined') return;
            const el = document.getElementById('broker-map');
            if (!el) return;
            brokerMap = L.map('broker-map', { scrollWheelZoom: true }).setView([25.03, 121.5], 11);
            brokerMapBasemapLayer = L.tileLayer(getCartoBasemapUrl(), {
                attribution: getCartoAttribution(),
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(brokerMap);
            brokerMapMarkers = {};
            brokerCodes.forEach(code => {
                const c = brokerCoords[code];
                if (!c) return;
                const marker = L.marker([c.lat, c.lng]).addTo(brokerMap);
                marker.bindTooltip(shortBrokerMapLabel(c.name), {
                    permanent: false,
                    direction: 'top',
                    offset: [0, -8],
                    className: 'broker-pin-tooltip'
                });
                marker.on('click', () => {
                    brokerMap.flyTo([c.lat, c.lng], 14, { duration: 0.85 });
                    marker.openTooltip();
                    currentETF = code;
                    onETFChange();
                });
                brokerMapMarkers[code] = marker;
            });
            updateBrokerMapThemeClass();
            setTimeout(function() {
                if (brokerMap) {
                    brokerMap.invalidateSize();
                    syncBrokerMapToSelection(currentETF);
                }
            }, 200);
        }

        function syncBrokerMapToSelection(etf) {
            if (!brokerMap) return;
            if (etf === KAIJI_TAB) {
                brokerMap.flyTo([25.03, 121.5], 11, { duration: 0.85 });
                return;
            }
            const c = brokerCoords[etf];
            if (!c) return;
            brokerMap.flyTo([c.lat, c.lng], 14, { duration: 0.85 });
            const m = brokerMapMarkers[etf];
            if (m) {
                setTimeout(function() { m.openTooltip(); }, 400);
            }
        }

        function ensureBrokerMapVisibleAndSync() {
            const mapEl = document.getElementById('broker-map');
            if (!mapEl) return;
            if (currentMode !== 'BROKER') {
                mapEl.classList.add('hidden');
                mapEl.setAttribute('aria-hidden', 'true');
                return;
            }
            mapEl.classList.remove('hidden');
            mapEl.setAttribute('aria-hidden', 'false');
            if (!brokerMap) {
                initBrokerMap();
            } else {
                setTimeout(function() {
                    if (brokerMap) {
                        brokerMap.invalidateSize();
                        syncBrokerMapToSelection(currentETF);
                    }
                }, 50);
            }
        }

        function setMode(mode) {
            if (mode !== 'ETF' && mode !== 'BROKER' && mode !== 'SEARCH') return;
            if (mode === currentMode) return;
            currentMode = mode;
            updateModeTabStyles();
            const dashPanel = document.getElementById('dashboard-mode-panel');
            const searchPanel = document.getElementById('search-mode-panel');
            const pillsSection = document.getElementById('section-pills');
            if (mode === 'SEARCH') {
                if (pillsSection) pillsSection.classList.add('hidden');
                if (dashPanel) dashPanel.classList.add('hidden');
                if (searchPanel) searchPanel.classList.remove('hidden');
                runStockReverseSearch();
                return;
            }
            if (pillsSection) pillsSection.classList.remove('hidden');
            if (dashPanel) dashPanel.classList.remove('hidden');
            if (searchPanel) searchPanel.classList.add('hidden');
            if (mode === 'ETF') {
                currentETF = FAMILY_TAB;
            } else {
                currentETF = KAIJI_TAB;
            }
            renderTargetPills();
            onETFChange();
        }

        function selectTarget(etf) {
            currentETF = etf;
            onETFChange();
        }

        function renderTargetPills() {
            const container = document.getElementById('target-pills-container');
            if (!container) return;
            container.innerHTML = '';
            const rows = getDropdownEtfList();
            let lastGroup = null;
            let rowEl = null;
            rows.forEach(etf => {
                const group = getETFGroupForRender(etf);
                if (group !== lastGroup) {
                    const h = document.createElement('div');
                    h.className = 'text-lg sm:text-xl font-bold tracking-wide theme-text font-mono w-full mt-4 first:mt-0 mb-2 border-b theme-border pb-2';
                    const gdef = ETF_GROUP_DEFS.find(g => g.id === group);
                    h.textContent = gdef ? gdef.title : '';
                    container.appendChild(h);
                    rowEl = document.createElement('div');
                    rowEl.className = 'flex flex-wrap gap-2';
                    container.appendChild(rowEl);
                    lastGroup = group;
                }
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.dataset.etf = etf;
                btn.className = 'pill-btn pill-btn-idle';
                btn.textContent = getPillButtonLabel(etf);
                btn.onclick = () => selectTarget(etf);
                rowEl.appendChild(btn);
            });
            updatePillActiveState();
        }

        function updatePillActiveState() {
            document.querySelectorAll('#target-pills-container [data-etf]').forEach(btn => {
                const on = btn.dataset.etf === currentETF;
                btn.classList.toggle('pill-btn-active', on);
                btn.classList.toggle('pill-btn-idle', !on);
                btn.setAttribute('aria-pressed', on ? 'true' : 'false');
            });
        }

        function onETFChange() {
            if (currentMode === 'SEARCH') return;
            const searchInp = document.getElementById('search-input');
            if (searchInp) searchInp.value = '';
            const isAI = currentETF === AI_TAB;
            const tfr = document.getElementById('timeframe-unit-row');
            if (tfr) tfr.classList.toggle('hidden', isAI);
            const hc = document.getElementById('header-controls');
            if (hc) hc.classList.toggle('hidden', isAI);
            const sf = document.getElementById('sector-flow-container');
            if (sf) sf.classList.toggle('hidden', isAI);
            const nv = document.getElementById('normal-view');
            if (nv) nv.classList.toggle('hidden', isAI);
            const sv = document.getElementById('search-view');
            if (sv) sv.classList.add('hidden');
            const aiV = document.getElementById('ai-agent-view');
            if (aiV) aiV.classList.toggle('hidden', !isAI);
            const titleEl = document.getElementById('current-etf-title');
            if (titleEl) titleEl.textContent = isAI ? 'AI_AGENT' : (currentETF === FAMILY_TAB ? 'GLOBAL_CONSENSUS' : (currentETF === KAIJI_TAB ? 'KAIJI_CONSENSUS (凱基大聯盟)' : (brokerLabels[currentETF] ? currentETF + ' ' + brokerLabels[currentETF] : currentETF)));
            const dateEl = document.getElementById('current-date-display');
            if (dateEl) dateEl.textContent = isAI ? 'PROTOCOL_ACTIVE' : dateRangeLabel();
            if (!isAI) {
                refreshTable();
            }
            updatePillActiveState();
            ensureBrokerMapVisibleAndSync();
        }

        function onTimeframeChange() {
            const sel = document.getElementById('timeframe-selector');
            if (sel) currentDays = parseInt(sel.value, 10) || 5;
            const dateEl = document.getElementById('current-date-display');
            if (dateEl) dateEl.textContent = dateRangeLabel();
            refreshTable();
            maybeRefreshStockReverseSearch();
        }

        function onDateChange() {
            const ds = document.getElementById('date-selector');
            if (ds) currentDate = ds.value;
            const dateEl = document.getElementById('current-date-display');
            if (dateEl) dateEl.textContent = dateRangeLabel();
            refreshTable();
            maybeRefreshStockReverseSearch();
        }

        function maybeRefreshStockReverseSearch() {
            if (currentMode !== 'SEARCH') return;
            const inp = document.getElementById('stock-reverse-input');
            if (inp && inp.value.trim()) runStockReverseSearch();
        }

        function dateRangeLabel() {
            if (!availableDatesDesc.length) return '—';
            const idx = Math.max(0, availableDatesDesc.indexOf(currentDate));
            const slice = availableDatesDesc.slice(idx, idx + Math.min(currentDays, availableDatesDesc.length - idx));
            if (slice.length === 0) return currentDate || '—';
            return slice.length === 1 ? slice[0] : slice[slice.length - 1] + ' ~ ' + slice[0];
        }

        function setUnit(u) {
            currentUnit = u;
            const ua = document.getElementById('unit-btn-amount');
            const us = document.getElementById('unit-btn-shares');
            if (ua) ua.classList.toggle('unit-active', u === 'amount');
            if (us) us.classList.toggle('unit-active', u === 'shares');
            refreshTable();
            maybeRefreshStockReverseSearch();
        }

        function initApiKey() {
            const key = localStorage.getItem('openai_api_key');
            if (key) {
                document.getElementById('api-key-input').value = key;
                document.getElementById('api-key-status').textContent = "STATUS: KEY_LOADED";
                document.getElementById('api-key-status').className = "font-mono text-xs ml-2 text-buy";
            } else {
                document.getElementById('api-key-status').textContent = "STATUS: NO_KEY";
                document.getElementById('api-key-status').className = "font-mono text-xs ml-2 theme-text-dim";
            }
        }

        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (key) {
                localStorage.setItem('openai_api_key', key);
                document.getElementById('api-key-status').textContent = "STATUS: KEY_SAVED";
                document.getElementById('api-key-status').className = "font-mono text-xs ml-2 text-buy";
            } else {
                localStorage.removeItem('openai_api_key');
                document.getElementById('api-key-status').textContent = "STATUS: KEY_CLEARED";
                document.getElementById('api-key-status').className = "font-mono text-xs ml-2 text-sell";
            }
        }

        function init() {
            currentMode = 'ETF';
            currentETF = FAMILY_TAB;
            if (availableDatesDesc.length > 0) {
                currentDate = availableDatesDesc[0];
            } else {
                currentDate = '';
            }
            updateModeTabStyles();
            renderTargetPills();
            const dateSel = document.getElementById('date-selector');
            if (dateSel) {
                dateSel.innerHTML = '';
                availableDatesDesc.forEach(date => {
                    const opt = document.createElement('option');
                    opt.value = date;
                    opt.textContent = date;
                    dateSel.appendChild(opt);
                });
                if (currentDate) dateSel.value = currentDate;
            }
            const tfSel = document.getElementById('timeframe-selector');
            if (tfSel) tfSel.value = String(currentDays);
            setUnit(currentUnit);
            const titleEl = document.getElementById('current-etf-title');
            if (titleEl) titleEl.textContent = currentETF === FAMILY_TAB ? 'GLOBAL_CONSENSUS' : (currentETF === AI_TAB ? 'AI_AGENT' : currentETF);
            const dateDisp = document.getElementById('current-date-display');
            if (dateDisp) dateDisp.textContent = dateRangeLabel();
            onETFChange();
            initApiKey();
            const sri = document.getElementById('stock-reverse-input');
            if (sri) {
                sri.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') runStockReverseSearch();
                });
                sri.addEventListener('input', function() {
                    if (currentMode === 'SEARCH' && !sri.value.trim()) {
                        showStockReverseIdlePlaceholder();
                    }
                });
            }
        }

        function getActorLabelForReverseSearch(actorKey) {
            if (brokerLabels[actorKey]) return brokerLabels[actorKey] + ' (' + actorKey + ')';
            return getETFLabel(actorKey);
        }

        function showStockReverseIdlePlaceholder() {
            const out = document.getElementById('stock-reverse-results');
            if (!out) return;
            out.innerHTML = '<div class="px-4 py-12 text-center font-mono text-sm theme-text-dim">請輸入股票代號開始追蹤主力</div>';
        }

        function getDateSliceForStockSearch() {
            if (availableDatesDesc.length === 0) return [];
            let dateIndex = availableDatesDesc.indexOf(currentDate);
            if (dateIndex === -1) dateIndex = 0;
            return availableDatesDesc.slice(dateIndex, dateIndex + Math.min(currentDays, availableDatesDesc.length - dateIndex));
        }

        function formatAmountNetDisplay(amount_10k) {
            if (amount_10k == null || amount_10k === 0) return '—';
            const neg = amount_10k < 0;
            const abs = Math.abs(amount_10k);
            let inner;
            if (abs >= 10000) inner = '約 ' + (abs / 10000).toFixed(2) + ' 億';
            else inner = '約 ' + Math.round(abs).toLocaleString() + ' 萬';
            return (neg ? '−' : '+') + inner;
        }

        function runStockReverseSearch() {
            const inp = document.getElementById('stock-reverse-input');
            const out = document.getElementById('stock-reverse-results');
            if (!inp || !out) return;
            const raw = inp.value.trim();
            if (!raw) {
                showStockReverseIdlePlaceholder();
                return;
            }
            const q = raw.toLowerCase();
            const dateSlice = getDateSliceForStockSearch();
            const netMap = new Map();

            function mergeKey(actorKey, item) {
                return actorKey + '|' + String(item.code || '') + '|' + String(item.name || '');
            }

            function matches(item) {
                const code = (item.code != null ? String(item.code) : '').toLowerCase();
                const name = (item.name != null ? String(item.name) : '').toLowerCase();
                return code.includes(q) || name.includes(q);
            }

            function addSigned(actorKey, item, sign) {
                const k = mergeKey(actorKey, item);
                const prev = netMap.get(k) || { actorKey: actorKey, item: item, netDiff: 0, netAmount: 0 };
                prev.netDiff += (item.diff || 0) * sign;
                prev.netAmount += (item.amount || 0) * sign;
                prev.item = item;
                netMap.set(k, prev);
            }

            dateSlice.forEach(function(d) {
                const dayData = db[d];
                if (!dayData || typeof dayData !== 'object') return;
                Object.keys(dayData).forEach(function(actorKey) {
                    if (actorKey === AI_TAB) return;
                    const bucket = dayData[actorKey];
                    if (!bucket || typeof bucket !== 'object') return;
                    (bucket.new_buy || []).forEach(function(item) {
                        if (matches(item)) addSigned(actorKey, item, 1);
                    });
                    (bucket.increased || []).forEach(function(item) {
                        if (matches(item)) addSigned(actorKey, item, 1);
                    });
                    (bucket.decreased || []).forEach(function(item) {
                        if (matches(item)) addSigned(actorKey, item, -1);
                    });
                    (bucket.sold_out || []).forEach(function(item) {
                        if (matches(item)) addSigned(actorKey, item, -1);
                    });
                });
            });

            const buys = [];
            const sells = [];
            netMap.forEach(function(entry) {
                if (entry.netDiff > 0) buys.push(entry);
                else if (entry.netDiff < 0) sells.push(entry);
            });

            const sortVal = function(e) {
                return currentUnit === 'amount' ? Math.abs(e.netAmount) : Math.abs(e.netDiff);
            };
            const sortDesc = function(a, b) { return sortVal(b) - sortVal(a); };

            const etfBuy = [];
            const etfSell = [];
            const brokerBuy = [];
            const brokerSell = [];
            buys.forEach(function(e) {
                if (brokerLabels[e.actorKey]) brokerBuy.push(e);
                else etfBuy.push(e);
            });
            sells.forEach(function(e) {
                if (brokerLabels[e.actorKey]) brokerSell.push(e);
                else etfSell.push(e);
            });
            etfBuy.sort(sortDesc);
            etfSell.sort(sortDesc);
            brokerBuy.sort(sortDesc);
            brokerSell.sort(sortDesc);

            if (buys.length === 0 && sells.length === 0) {
                out.innerHTML = '<div class="px-4 py-8 text-center font-mono text-sm theme-text-dim">區間內無主力異動紀錄</div>';
                return;
            }

            function rowHtml(entry, isBuySide) {
                const it = entry.item;
                const name = it.name || '—';
                const code = it.code ? '<span class="font-mono text-[10px] opacity-80 ml-1">' + it.code + '</span>' : '';
                const nd = entry.netDiff;
                const na = entry.netAmount;
                const diffStr = (nd >= 0 ? '+' : '') + nd.toLocaleString() + ' 張';
                const amtStr = formatAmountNetDisplay(na);
                const color = isBuySide ? 'text-red-600 dark:text-red-400' : 'text-green-600 dark:text-green-400';
                const nums = '<div class="flex flex-wrap items-center justify-end sm:justify-end gap-x-0 font-mono text-xs sm:text-sm font-bold ' + color + ' w-full sm:w-auto shrink-0 mt-1 sm:mt-0">' +
                    '<span class="tabular-nums">' + diffStr + '</span>' +
                    '<span class="inline-flex items-center mx-1.5 sm:mx-2 text-zinc-300 dark:text-zinc-600 select-none" aria-hidden="true"><span class="hidden sm:inline w-px h-3.5 bg-zinc-300 dark:bg-zinc-600"></span><span class="sm:hidden text-[10px] px-0.5">|</span></span>' +
                    '<span class="tabular-nums">' + amtStr + '</span></div>';
                return '<div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-2 py-2.5 px-2 sm:px-3 border-b theme-border last:border-b-0 row-hover">' +
                    '<div class="min-w-0 flex-1 pr-0 sm:pr-1"><span class="font-mono text-[10px] sm:text-xs theme-text-dim block mb-0.5 leading-snug">' + getActorLabelForReverseSearch(entry.actorKey) + '</span>' +
                    '<span class="font-bold theme-text text-sm leading-snug break-words">' + name + '</span>' + code + '</div>' +
                    nums + '</div>';
            }

            function renderBuySellGrid(buyArr, sellArr, buyHead, sellHead) {
                return '<div class="grid grid-cols-1 md:grid-cols-2 md:divide-x md:divide-zinc-200 dark:md:divide-zinc-700">' +
                    '<div class="flex flex-col min-w-0 border-b theme-border md:border-b-0">' +
                    '<div class="px-2 sm:px-3 py-2 font-mono text-[10px] sm:text-xs font-bold tracking-wider bg-red-50 dark:bg-red-950/30 text-red-700 dark:text-red-300 border-b theme-border">' + buyHead + '</div>' +
                    '<div class="max-h-[min(50vh,22rem)] md:max-h-[min(60vh,28rem)] overflow-y-auto overflow-x-hidden">' +
                    (buyArr.length ? buyArr.map(function(e) { return rowHtml(e, true); }).join('') : '<div class="px-2 sm:px-3 py-5 sm:py-6 text-center text-xs sm:text-sm theme-text-dim font-mono">無</div>') +
                    '</div></div>' +
                    '<div class="flex flex-col min-w-0">' +
                    '<div class="px-2 sm:px-3 py-2 font-mono text-[10px] sm:text-xs font-bold tracking-wider bg-green-50 dark:bg-green-950/30 text-green-700 dark:text-green-300 border-b theme-border">' + sellHead + '</div>' +
                    '<div class="max-h-[min(50vh,22rem)] md:max-h-[min(60vh,28rem)] overflow-y-auto overflow-x-hidden">' +
                    (sellArr.length ? sellArr.map(function(e) { return rowHtml(e, false); }).join('') : '<div class="px-2 sm:px-3 py-5 sm:py-6 text-center text-xs sm:text-sm theme-text-dim font-mono">無</div>') +
                    '</div></div></div>';
            }

            const etfSection = '<section class="rounded-xl border theme-border overflow-hidden bg-[var(--bg-panel)]">' +
                '<h3 class="px-3 sm:px-4 py-2.5 text-sm sm:text-base font-black theme-text tracking-wide border-b theme-border bg-[var(--bg-base)]">【 ETF 持倉異動 】</h3>' +
                renderBuySellGrid(etfBuy, etfSell, '買進（淨買為正 · 區間累計）', '賣出（淨賣為負 · 區間累計）') +
                '</section>';

            const brokerSection = '<section class="rounded-xl border theme-border overflow-hidden bg-[var(--bg-panel)]">' +
                '<h3 class="px-3 sm:px-4 py-2.5 text-sm sm:text-base font-black theme-text tracking-wide border-b theme-border bg-[var(--bg-base)]">【 主力分點異動 】</h3>' +
                renderBuySellGrid(brokerBuy, brokerSell, '買進（淨買為正 · 區間累計）', '賣出（淨賣為負 · 區間累計）') +
                '</section>';

            out.innerHTML = '<div class="flex flex-col gap-6 sm:gap-8">' + etfSection + brokerSection + '</div>';
        }

        function refreshTable() {
            if (currentMode === 'SEARCH') return;
            if (currentETF === AI_TAB) return;
            const { buy, sell } = aggregateData(currentETF, currentDays);
            const sortBy = currentUnit === 'amount' ? 'amount' : 'diff';
            buy.sort((a, b) => (b[sortBy] || 0) - (a[sortBy] || 0));
            sell.sort((a, b) => (b[sortBy] || 0) - (a[sortBy] || 0));

            const emptyState = document.getElementById('empty-state');
            const dataContainer = document.getElementById('data-table-container');
            if (!emptyState || !dataContainer) return;
            if (buy.length === 0 && sell.length === 0) {
                emptyState.classList.remove('hidden');
                dataContainer.classList.add('hidden');
                const ca = document.getElementById('consensus-alert-container');
                if (ca) ca.classList.add('hidden');
                return;
            }
            emptyState.classList.add('hidden');
            dataContainer.classList.remove('hidden');

            const consensusContainer = document.getElementById('consensus-alert-container');
            const consensusList = document.getElementById('consensus-alert-list');
            if (currentETF === KAIJI_TAB) {
                let dateIndex = availableDatesDesc.indexOf(currentDate);
                if (dateIndex === -1) dateIndex = 0;
                const dateSlice = availableDatesDesc.slice(dateIndex, dateIndex + Math.min(currentDays, availableDatesDesc.length - dateIndex));
                const brokerList = brokerCodes.filter(b => allKeys.has(b));
                const stockBrokerCount = {};
                dateSlice.forEach(d => {
                    const dataOfDay = db[d] || {};
                    brokerList.forEach(b => {
                        const dayData = dataOfDay[b];
                        if (!dayData) return;
                        [...(dayData.increased || []), ...(dayData.new_buy || [])].forEach(i => {
                            if ((i.diff || 0) > 0) {
                                const key = i.name;
                                if (!stockBrokerCount[key]) stockBrokerCount[key] = new Set();
                                stockBrokerCount[key].add(b);
                            }
                        });
                    });
                });
                const highConsensusNames = Object.entries(stockBrokerCount).filter(([, brokers]) => brokers.size >= 3).map(([n]) => n);
                const buyMap = {};
                buy.forEach(i => { buyMap[i.name] = i; });
                const consensusItems = highConsensusNames.filter(n => buyMap[n]).map(n => buyMap[n]);
                if (consensusItems.length > 0) {
                    consensusContainer.classList.remove('hidden');
                    consensusList.innerHTML = consensusItems.map(i => {
                        const valStr = currentUnit === 'amount' ? formatAmount(i.amount) : '+' + (i.diff || 0).toLocaleString() + ' 張';
                        return `<span class="consensus-tag inline-flex items-center gap-1 px-3 py-1.5 rounded-lg font-mono text-sm font-bold">${i.name} ${i.code ? '(' + i.code + ')' : ''} ${valStr}</span>`;
                    }).join('');
                } else {
                    consensusContainer.classList.add('hidden');
                }
            } else {
                consensusContainer.classList.add('hidden');
            }

            const sfContainer = document.getElementById('sector-flow-container');
            const sectorTotals = {};
            buy.forEach(i => {
                const s = i.sector || '其他';
                if (!sectorTotals[s]) sectorTotals[s] = 0;
                sectorTotals[s] += currentUnit === 'amount' ? i.amount : i.diff;
            });
            sell.forEach(i => {
                const s = i.sector || '其他';
                if (!sectorTotals[s]) sectorTotals[s] = 0;
                sectorTotals[s] -= currentUnit === 'amount' ? i.amount : i.diff;
            });
            let topSectors = Object.entries(sectorTotals).filter(x => x[1] !== 0).sort((a, b) => Math.abs(b[1]) - Math.abs(a[1])).slice(0, 3);
            sfContainer.innerHTML = '';
            topSectors.forEach(s => {
                const isFlowIn = s[1] > 0;
                const cColor = isFlowIn ? 'text-buy' : 'text-sell';
                const cBorder = isFlowIn ? 'border-buy' : 'border-sell';
                const sign = isFlowIn ? '+' : '-';
                const valStr = currentUnit === 'amount' ? formatAmount(Math.abs(s[1])) : Math.abs(s[1]).toLocaleString();
                sfContainer.innerHTML += `<div class="flex flex-col border-l-[3px] ${cBorder} pl-3 py-1.5 theme-bg-input rounded-r pr-4 min-w-[120px]"><span class="text-[11px] font-bold theme-text-dim mb-0.5">${s[0]}</span><span class="font-mono text-sm font-bold ${cColor}">${sign}${valStr}</span></div>`;
            });
            if (topSectors.length === 0) sfContainer.classList.add('hidden');
            else sfContainer.classList.remove('hidden');

            const formatVal = (item, isBuy) => {
                if (currentUnit === 'amount') return (isBuy ? '+ ' : '- ') + formatAmount(item.amount);
                return (isBuy ? '+' : '-') + (item.diff || 0).toLocaleString() + ' 張';
            };

            const buyTbody = document.getElementById('buy-rank-tbody');
            buyTbody.innerHTML = buy.map((item, i) => {
                const codeHtml = item.code ? `<span class="font-mono text-[10px] theme-text-dim ml-1">${item.code}</span>` : '';
                return `<tr class="row-hover border-b theme-border last:border-0"><td class="py-3.5 px-3 sm:px-4 font-mono theme-text-dim">${i + 1}</td><td class="py-3.5 px-3 sm:px-4 min-w-0"><span class="font-bold theme-text break-words">${item.name}</span>${codeHtml}</td><td class="py-3.5 px-3 sm:px-4 text-right font-mono font-bold text-buy table-num-cell whitespace-nowrap">${formatVal(item, true)}</td></tr>`;
            }).join('');

            const sellTbody = document.getElementById('sell-rank-tbody');
            sellTbody.innerHTML = sell.map((item, i) => {
                const codeHtml = item.code ? `<span class="font-mono text-[10px] theme-text-dim ml-1">${item.code}</span>` : '';
                return `<tr class="row-hover border-b theme-border last:border-0"><td class="py-3.5 px-3 sm:px-4 font-mono theme-text-dim">${i + 1}</td><td class="py-3.5 px-3 sm:px-4 min-w-0"><span class="font-bold theme-text break-words">${item.name}</span>${codeHtml}</td><td class="py-3.5 px-3 sm:px-4 text-right font-mono font-bold text-sell table-num-cell whitespace-nowrap">${formatVal(item, false)}</td></tr>`;
            }).join('');
        }

        function formatAmount(amount_10k) {
            if (!amount_10k) return "";
            let val = Math.abs(amount_10k);
            if (val >= 10000) return `約 ${(val/10000).toFixed(2)} 億`;
            return `約 ${Math.round(val).toLocaleString()} 萬`;
        }

        function handleSearch() {
            if (currentMode === 'SEARCH') return;
            const inp = document.getElementById('search-input');
            if (!inp) return;
            const val = inp.value.trim().toLowerCase();
            const normalView = document.getElementById('normal-view');
            const searchView = document.getElementById('search-view');
            const sfContainer = document.getElementById('sector-flow-container');

            if (currentETF === AI_TAB) return;
            if (!val) {
                normalView.classList.remove('hidden');
                searchView.classList.add('hidden');
                sfContainer.classList.remove('hidden');
                refreshTable();
                return;
            }

            normalView.classList.add('hidden');
            sfContainer.classList.add('hidden');
            searchView.classList.remove('hidden');

            const resultsContainer = document.getElementById('search-results-list');
            resultsContainer.innerHTML = '';

            const { buy, sell } = aggregateData(currentETF, currentDays);
            const allMatches = [...buy.filter(i => (i.name + (i.code || '')).toLowerCase().includes(val)).map(i => ({ ...i, sign: '+', isBuy: true })),
                ...sell.filter(i => (i.name + (i.code || '')).toLowerCase().includes(val)).map(i => ({ ...i, sign: '-', isBuy: false }))];
            allMatches.sort((a, b) => (b.diff || 0) - (a.diff || 0));

            if (allMatches.length === 0) {
                resultsContainer.innerHTML = '<div class="py-12 text-center theme-text-dim font-mono text-sm">> RADAR_EMPTY</div>';
                return;
            }

            allMatches.forEach(a => {
                const colorClass = a.isBuy ? 'text-buy' : 'text-sell';
                const valStr = currentUnit === 'amount' ? (a.sign + ' ' + formatAmount(a.amount)) : (a.sign + (a.diff || 0).toLocaleString());
                const codeHtml = a.code ? `<span class="font-mono text-[10px] theme-text-dim ml-1">${a.code}</span>` : '';
                resultsContainer.innerHTML += `<div class="flex justify-between items-center gap-2 py-3.5 px-4 border-b theme-border row-hover transition-colors"><div class="flex items-center gap-2 min-w-0"><span class="theme-text text-[14px] font-bold break-words">${a.name}</span>${codeHtml}</div><span class="${colorClass} font-mono font-bold text-[14px] whitespace-nowrap flex-shrink-0">${valStr}</span></div>`;
            });
        }

        function getAIErrorMessage(status, data) {
            if (status === 401) return '[ 認證失敗 ] API Key 無效或已過期，請檢查後重新儲存。';
            if (status === 429) return '[ 額度用盡 ] 已達 API 使用上限或 Rate Limit，請稍後再試。';
            if (status >= 500) return '[ 伺服器錯誤 ] OpenAI 服務暫時異常，請稍後再試。';
            if (status >= 400) return '[ 請求錯誤 ] ' + (data?.error?.message || '請檢查輸入後重試。');
            return '[ 連線錯誤 ] 無法聯絡 API，請檢查網路連線。';
        }

        async function runAIAnalysis() {
            const ticker = document.getElementById('ai-ticker-input').value.trim();
            const output = document.getElementById('ai-report-output');
            const btn = document.getElementById('btn-run-ai');
            const apiKey = localStorage.getItem('openai_api_key');

            if (!apiKey) {
                output.innerHTML = "<span class='text-sell font-bold'>[ ERROR ] 請先於上方設定 OpenAI API Key，並點擊 [ SAVE_KEY ]。</span>";
                return;
            }
            if (!ticker) {
                output.innerHTML = "<span class='text-sell font-bold'>[ ERROR ] 請輸入股票代號或名稱 (例如：2330)。</span>";
                return;
            }

            output.innerHTML = "<span class='theme-text-dim'>[ SYSTEM ] 啟動決策引擎...<br>[ SYSTEM ] 正在向證交所/櫃買中心攔截即時報價...</span>";
            btn.disabled = true;
            btn.textContent = "[ PROCESSING... ]";
            btn.classList.add("opacity-50", "cursor-not-allowed");

            let currentPrice = "未知 (請依賴歷史基本面評估)";

            try {
                try {
                    const twseResp = await fetch('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL');
                    if (twseResp.ok) {
                        const twseData = await twseResp.json();
                        const stock = twseData.find(s => (s.Code && String(s.Code) === ticker) || (s.Name && String(s.Name).includes(ticker)));
                        if (stock && stock.ClosingPrice) {
                            currentPrice = stock.ClosingPrice + " 元 (TWSE即時)";
                        }
                    }
                } catch (e) { /* TWSE fail */ }

                if (currentPrice === "未知 (請依賴歷史基本面評估)") {
                    try {
                        const tpexResp = await fetch('https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes');
                        if (tpexResp.ok) {
                            const tpexData = await tpexResp.json();
                            const stock = tpexData.find(s => (s.SecuritiesCompanyCode && String(s.SecuritiesCompanyCode) === ticker) || (s.CompanyName && String(s.CompanyName).includes(ticker)));
                            if (stock && stock.Close) {
                                currentPrice = stock.Close + " 元 (TPEx即時)";
                            }
                        }
                    } catch (e) { /* TPEx fail */ }
                }

                output.innerHTML = "<span class='theme-text-dim'>[ SYSTEM ] 報價取得完成。正在呼叫 OpenAI gpt-4o...</span>";

                const promptText = `【系統注入即時數據】
目標標的：${ticker}
今日收盤價：${currentPrice}

【系統強制指令】
你是一位頂尖的外資券商首席分析師。請「直接使用」上述系統提供的最新股價進行估值。嚴禁嘗試聯網搜尋，也「絕對不要」在報告中因為無法獲取最新資訊而道歉或提示。請完全依賴你的核心訓練知識，展現專業自信，完成以下 5 大維度的深度報告：

1. 財務報表分析：
分析該公司過去的營收增長、淨利趨勢、自由現金流與利潤率。判斷其財務體質。

2. 估值分析：
使用系統提供的今日收盤價（${currentPrice}），結合該公司的歷史 P/E 區間與產業平均，推算目前股價是被低估還是高估。

3. 成長潛力分析：
評估該公司的商業模式、護城河、未來 5-10 年在 AI 或新技術浪潮下的成長空間與潛在市場規模。

4. 多空對峙辯論：
模擬兩位分析師進行辯論。一位看多 (Bull) 提出潛在利多；一位看空 (Bear) 提出結構性風險與隱憂。

5. 投資建議評估：
給出明確的結論：針對目前市價，給出「買入 (Buy)」、「持有 (Hold)」或「避開 (Avoid)」的評級，並列出核心催化劑。

請全程使用 Markdown 格式輸出，語氣必須果斷、客觀、專業。`;

                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o",
                        messages: [
                            { role: "system", content: "你是一位外資券商首席分析師，精通基本面與量化估值。請以繁體中文輸出高專業度報告，善用 Markdown 格式進行排版。" },
                            { role: "user", content: promptText }
                        ],
                        temperature: 0.5
                    })
                });

                let data = {};
                try {
                    data = await response.json();
                } catch (e) {
                    data = {};
                }

                if (!response.ok) {
                    const msg = getAIErrorMessage(response.status, data);
                    throw new Error(msg);
                }

                const rawContent = data.choices?.[0]?.message?.content;
                if (!rawContent) {
                    throw new Error('[ 回應異常 ] API 未返回有效內容，請重試。');
                }
                output.innerHTML = (typeof marked !== 'undefined' ? (marked.parse || marked)(rawContent) : rawContent);
            } catch (error) {
                const msg = error.message || String(error);
                output.innerHTML = `<span class='text-sell font-bold'>${msg}</span>`;
            } finally {
                btn.disabled = false;
                btn.textContent = "[ EXECUTE_ANALYSIS ]";
                btn.classList.remove("opacity-50", "cursor-not-allowed");
            }
        }

        window.onload = init;
    </script>
</body>
</html>
