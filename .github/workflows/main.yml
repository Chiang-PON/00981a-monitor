name: 主動式ETF 監控

on:
  schedule:
    # 台灣時間每天 18:00 (UTC 10:00) 執行
    - cron: '00 10 * * *'
  workflow_dispatch: # 允許手動觸發按鈕

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 防止爬蟲卡住浪費額度
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 selenium webdriver-manager

      - name: Run script (執行爬蟲)
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: python main.py --force # 在 Actions 裡固定加上 force 以防時區誤判假日

      - name: Commit and Push Data (存檔回倉庫)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history/
          # 如果沒有變更就不會報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update ETF history data [skip ci]" && git push)